<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>track hell.</title>
<style>
  :root {
    --bg:         #0d0d12;
    --surface:    #14141c;
    --surface2:   #1c1c28;
    --border:     #2a2a3a;
    --purple:     #a78bfa;
    --purple2:    #7c3aed;
    --purple-dim: #2d2050;
    --text:       #e8e6f0;
    --text-dim:   #7a7890;
    --text-mid:   #b0adc8;
    --green:      #6ee7b7;
    --amber:      #fbbf24;
    --red:        #f87171;
    --radius:     8px;
    --font:       'Arial Narrow', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-size: 16px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .logo span { color: var(--text-dim); font-weight: normal; }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .header-date { color: var(--text-dim); font-size: 12px; letter-spacing: 0.04em; }
  .streak-pill {
    background: var(--purple-dim);
    border: 1px solid var(--purple2);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--purple);
    letter-spacing: 0.04em;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .panel:last-child { margin-bottom: 0; }
  .panel-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* ── LOG INPUT ── */
  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.7;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--purple-dim); }
  textarea::placeholder { color: var(--text-dim); opacity: 0.7; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  .date-row label { color: var(--text-dim); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  input[type="date"], input[type="text"], input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="date"]:focus, input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--purple-dim);
  }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

  .btn-submit {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: var(--purple2);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: var(--font);
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover:not(:disabled) { background: var(--purple); }
  .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
  }
  .stat-val { font-size: 24px; font-weight: bold; color: var(--purple); line-height: 1; }
  .stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── GOAL CARDS ── */
  .goal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .goal-card:last-child { margin-bottom: 0; }
  .goal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .goal-name { font-size: 13px; font-weight: bold; color: var(--text); }
  .goal-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .goal-pct { font-size: 13px; color: var(--purple); font-weight: bold; flex-shrink: 0; margin-left: 8px; }
  .goal-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .goal-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple2), var(--purple));
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .goal-chips { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-mid);
    border: 1px solid var(--border);
  }
  .chip.warn { background: rgba(251,191,36,0.08); color: var(--amber); border-color: rgba(251,191,36,0.2); }
  .chip.ok   { background: rgba(110,231,183,0.08); color: var(--green); border-color: rgba(110,231,183,0.2); }
  .btn-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .btn-del:hover { color: var(--red); }

  /* ── ADD GOAL ── */
  .add-goal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .add-goal-grid input { width: 100%; }
  .btn-sm {
    grid-column: span 2;
    padding: 8px;
    background: var(--purple-dim);
    border: 1px solid var(--purple2);
    border-radius: 6px;
    color: var(--purple);
    font-family: var(--font);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-sm:hover { background: var(--purple2); color: #fff; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 18px; }
  .tab {
    padding: 7px 18px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: none;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--purple-dim);
    border-color: var(--purple2);
    color: var(--purple);
  }
  .tab:hover:not(.active) { color: var(--text-mid); border-color: var(--border); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── INSIGHTS ── */
  .insights-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .insight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .insight-card.wide { grid-column: span 2; }
  .insight-icon { font-size: 17px; margin-bottom: 6px; }
  .insight-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 8px;
  }
  .insight-text { font-size: 13px; line-height: 1.75; color: var(--text-mid); }

  .protein-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .protein-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .protein-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple2), var(--green));
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .protein-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── HISTORY TABLE ── */
  .history-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th {
    text-align: left;
    padding: 9px 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    font-weight: normal;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text-mid); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .mood-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.04em;
  }
  .mood-good { background: rgba(110,231,183,0.1); color: var(--green); }
  .mood-warn { background: rgba(251,191,36,0.1);  color: var(--amber); }
  .mood-low  { background: rgba(248,113,113,0.1); color: var(--red); }

  /* ── EMPTY + LOADING ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 260px;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
  }
  .empty-icon { font-size: 32px; opacity: 0.25; }
  .empty-label { font-size: 13px; letter-spacing: 0.04em; line-height: 1.6; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--purple-dim);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s ease;
    z-index: 99;
    max-width: 300px;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── NEW GOAL BADGE ── */
  .new-goal-badge {
    background: var(--purple-dim);
    border: 1px solid var(--purple2);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--purple);
    margin-bottom: 14px;
    display: none;
    line-height: 1.5;
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; padding: 16px; }
    .insights-grid { grid-template-columns: 1fr; }
    .insight-card.wide { grid-column: span 1; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">track<span>.</span>hell</div>
  <div class="header-right">
    <div class="streak-pill" id="streakPill">— day streak</div>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>

<div class="container">

  <!-- ── LEFT ── -->
  <div>

    <div class="panel">
      <div class="panel-label">Today's Log</div>
      <textarea id="logInput" placeholder="Write your day freely —

woke up at 6am
3km run
breakfast — 2 chapati, paneer sabzi, curd
3 campusx pytorch videos
lunch — dal chawal + salad
1hr tv, some doomscrolling
dinner — rajma rice, glass of milk

or drop a goal in here:
i want to finish pytorch playlist, 14 videos, by june 25"></textarea>

      <div class="date-row">
        <label>Date</label>
        <input type="date" id="logDate"/>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitLog()">Submit Log</button>
    </div>

    <div class="panel">
      <div class="panel-label">Active Goals</div>
      <div id="goalsList">
        <div class="empty-state" style="min-height:80px">
          <div class="empty-label">No goals yet.<br>Add one below or mention it in your log.</div>
        </div>
      </div>

      <div style="margin-top:16px">
        <div class="panel-label">Add Goal</div>
        <div class="add-goal-grid">
          <input type="text" id="gName" placeholder="Goal name"/>
          <input type="text" id="gPlaylist" placeholder="Topic / playlist"/>
          <input type="number" id="gTotal" placeholder="Total videos" min="1"/>
          <input type="date" id="gDeadline"/>
          <button class="btn-sm" onclick="addGoal()">+ Add Goal</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── RIGHT ── -->
  <div>

    <!-- QUICK STATS -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" id="s-run">—</div><div class="stat-lbl">km today</div></div>
      <div class="stat-card"><div class="stat-val" id="s-protein">—</div><div class="stat-lbl">protein g</div></div>
      <div class="stat-card"><div class="stat-val" id="s-learn">—</div><div class="stat-lbl">videos</div></div>
      <div class="stat-card"><div class="stat-val" id="s-sleep">—</div><div class="stat-lbl">hrs sleep</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="insights" onclick="switchTab(this,'insights')">Insights</button>
      <button class="tab" data-tab="history" onclick="switchTab(this,'history')">History</button>
    </div>

    <!-- INSIGHTS -->
    <div class="tab-content active" id="tab-insights">
      <div id="newGoalBadge" class="new-goal-badge"></div>
      <div id="insightsArea">
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-label">Submit your day's log<br>to see insights here.</div>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-content" id="tab-history">
      <div class="panel">
        <div class="panel-label">Last 14 Days</div>
        <div class="history-wrap" id="historyTable">
          <div style="color:var(--text-dim); font-size:13px">No logs yet.</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── API base — empty string = same origin on Vercel ──────────────────────────
const API = "";

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("logDate").value = today;
  document.getElementById("headerDate").textContent = new Date().toLocaleDateString("en-IN", {
    weekday: "long", day: "numeric", month: "long", year: "numeric"
  });
  loadGoals();
  computeStreak();
});

// ── STREAK ────────────────────────────────────────────────────────────────────
async function computeStreak() {
  try {
    const res = await fetch(API + "/api/history?days=90");
    const logs = await res.json();
    if (!logs.length) return;
    const dates = new Set(logs.map(l => l.date));
    let streak = 0;
    let d = new Date();
    while (true) {
      const s = d.toISOString().split("T")[0];
      if (dates.has(s)) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }
    document.getElementById("streakPill").textContent = streak + " day streak";
  } catch(e) {}
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(el, name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
  if (name === "history") loadHistory();
}

// ── SUBMIT LOG ────────────────────────────────────────────────────────────────
async function submitLog() {
  const text = document.getElementById("logInput").value.trim();
  const date = document.getElementById("logDate").value;
  if (!text) { showToast("Write something first."); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Processing...';

  document.getElementById("insightsArea").innerHTML = `
    <div class="empty-state">
      <span class="spinner"></span>
      <div class="empty-label">Parsing your day with Groq...<br><span style="font-size:11px;opacity:0.6">usually takes 5–10 seconds</span></div>
    </div>`;

  try {
    const res = await fetch(API + "/api/submit_log", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, date })
    });

    if (!res.ok) throw new Error("Server error " + res.status);
    const data = await res.json();

    renderStats(data.parsed, data.insights);
    renderInsights(data.parsed, data.insights);
    renderGoals(data.goal_stats);
    computeStreak();

    if (data.new_goal) {
      const badge = document.getElementById("newGoalBadge");
      badge.innerHTML = `✦ New goal detected and saved — <strong>${data.new_goal.name}</strong>, ${data.new_goal.total_items} items, deadline ${data.new_goal.deadline}`;
      badge.style.display = "block";
      setTimeout(() => badge.style.display = "none", 10000);
    }

    showToast("Day logged ✓");
  } catch(e) {
    document.getElementById("insightsArea").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠</div>
        <div class="empty-label">Something went wrong.<br><span style="font-size:11px">${e.message}</span></div>
      </div>`;
    showToast("Error — check console.");
  }

  btn.disabled = false;
  btn.innerHTML = "Submit Log";
}

// ── RENDER STATS ──────────────────────────────────────────────────────────────
function renderStats(p, ins) {
  const run = (p.exercise || []).find(e => e.type === "run");
  document.getElementById("s-run").textContent = run?.distance_km?.toFixed(1) ?? "—";
  document.getElementById("s-protein").textContent = ins?.daily_protein_g ?? "—";
  const videos = (p.learning || []).reduce((a,b) => a+(b.items_done||0), 0);
  document.getElementById("s-learn").textContent = videos || "—";
  document.getElementById("s-sleep").textContent = p.sleep_hours?.toFixed(1) ?? "—";
}

// ── RENDER INSIGHTS ───────────────────────────────────────────────────────────
function renderInsights(p, ins) {
  if (!ins) {
    document.getElementById("insightsArea").innerHTML = `<div class="empty-state"><div class="empty-label">No insights returned.</div></div>`;
    return;
  }

  const proteinG = ins.daily_protein_g || 0;
  const proteinTarget = 120; // change this to your gym macro target
  const proteinPct = Math.min(100, Math.round((proteinG / proteinTarget) * 100));

  const cards = [
    { key:"fitness",      icon:"🏃", title:"Fitness" },
    { key:"nutrition",    icon:"🥗", title:"Nutrition", extra: true },
    { key:"learning",     icon:"📚", title:"Learning" },
    { key:"sleep",        icon:"🌙", title:"Sleep" },
    { key:"time_quality", icon:"⏱",  title:"Time" },
    { key:"mood",         icon:"◈",  title:"Mood", wide: true },
  ];

  document.getElementById("insightsArea").innerHTML = `
    <div class="insights-grid">
      ${cards.map(c => `
        <div class="insight-card ${c.wide ? 'wide' : ''}">
          <div class="insight-icon">${c.icon}</div>
          <div class="insight-title">${c.title}</div>
          <div class="insight-text">${ins[c.key] || '<span style="opacity:0.4">Nothing to report.</span>'}</div>
          ${c.extra ? `
            <div class="protein-row">
              <div class="protein-bar"><div class="protein-fill" style="width:${proteinPct}%"></div></div>
              <div class="protein-label">${proteinG}g / ${proteinTarget}g</div>
            </div>` : ""}
        </div>
      `).join("")}
    </div>`;
}

// ── GOALS ─────────────────────────────────────────────────────────────────────
async function loadGoals() {
  try {
    const res = await fetch(API + "/api/goals");
    const goals = await res.json();
    renderGoals(goals);
  } catch(e) {}
}

function renderGoals(goals) {
  const el = document.getElementById("goalsList");
  if (!goals || !goals.length) {
    el.innerHTML = `<div class="empty-state" style="min-height:70px"><div class="empty-label">No active goals yet.</div></div>`;
    return;
  }
  el.innerHTML = goals.map(g => {
    const behind = !g.on_track;
    const doneText = `${g.done}/${g.total}`;
    return `
      <div class="goal-card">
        <div class="goal-header">
          <div>
            <div class="goal-name">${g.name}</div>
            <div class="goal-sub">${g.playlist} · due ${g.deadline}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="goal-pct">${g.pct}%</span>
            <button class="btn-del" onclick="deleteGoal(${g.id})" title="Archive">✕</button>
          </div>
        </div>
        <div class="goal-bar"><div class="goal-bar-fill" style="width:${g.pct}%"></div></div>
        <div class="goal-chips">
          <span class="chip">${doneText} done</span>
          <span class="chip">${g.remaining} left</span>
          <span class="chip">${g.days_left}d remaining</span>
          <span class="chip ${behind ? 'warn' : 'ok'}">${behind ? '⚠ ' : '✓ '}${g.pace_needed}/day${behind ? ' — behind' : ''}</span>
        </div>
      </div>`;
  }).join("");
}

async function addGoal() {
  const name     = document.getElementById("gName").value.trim();
  const playlist = document.getElementById("gPlaylist").value.trim();
  const total    = parseInt(document.getElementById("gTotal").value);
  const deadline = document.getElementById("gDeadline").value;
  if (!name || !playlist || !total || !deadline) { showToast("Fill all four fields."); return; }

  await fetch(API + "/api/goals", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, playlist, total_items: total, deadline })
  });

  ["gName","gPlaylist","gTotal","gDeadline"].forEach(id => document.getElementById(id).value = "");
  showToast("Goal added ✓");
  loadGoals();
}

async function deleteGoal(id) {
  await fetch(API + "/api/goals?id=" + id, { method: "DELETE" });
  loadGoals();
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(API + "/api/history?days=14");
    const logs = await res.json();
    const el = document.getElementById("historyTable");
    if (!logs.length) { el.innerHTML = `<div style="color:var(--text-dim);font-size:13px">No logs yet.</div>`; return; }
    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Date</th><th>Run km</th><th>Protein g</th><th>Videos</th><th>Sleep h</th><th>Mood</th>
        </tr></thead>
        <tbody>
          ${logs.map(l => {
            const d = l.data;
            const run     = (d.exercise||[]).find(e=>e.type==="run")?.distance_km ?? "—";
            const protein = (d.meals||[]).reduce((a,b)=>a+(b.protein_est_g||0),0) || "—";
            const videos  = (d.learning||[]).reduce((a,b)=>a+(b.items_done||0),0) || "—";
            const sleep   = d.sleep_hours?.toFixed(1) ?? "—";
            const mood    = d.mood_signal || "—";
            const mc = mood==="good"?"mood-good": mood==="low"||mood==="wasted"?"mood-low":"mood-warn";
            return `<tr>
              <td>${l.date}</td>
              <td>${run}</td>
              <td>${protein}</td>
              <td>${videos}</td>
              <td>${sleep}</td>
              <td><span class="mood-tag ${mc}">${mood}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;
  } catch(e) {}
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
